services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: talentflow
      POSTGRES_PASSWORD: talentflow
      POSTGRES_DB: talentflow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U talentflow"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
